<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>South Mountain Owner Support Contacts</title>
  <style>
    :root { --brand:#1f2937; --accent:#111827; --bg:#f5f5f5; --card:#ffffff; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: #222;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      width: 100%;
      max-width: 520px;
      background: var(--card);
      border-radius: 18px;
      padding: 32px 24px;
      box-shadow: 0 8px 30px rgba(0,0,0,.12);
      text-align: center;
    }
    h1 {
      margin: 0 0 12px;
      font-size: 28px;
      line-height: 1.15;
      color: var(--brand);
    }
    .subtitle { font-size: 18px; margin: 0 0 24px; color: #444; }
    .button {
      display: inline-block;
      width: 100%;
      max-width: 320px;
      border: 0;
      border-radius: 10px;
      background: var(--accent);
      color: #fff;
      font-size: 20px;
      font-weight: bold;
      padding: 16px 20px;
      cursor: pointer;
      text-decoration: none;
    }
    .instructions {
      margin: 24px auto 0;
      text-align: left;
      max-width: 390px;
      font-size: 15px;
      line-height: 1.45;
      color: #333;
    }
    .instructions strong { color: #111; }
    .fallback { margin-top: 18px; font-size: 14px; color: #555; }
    .fallback a { color: #111827; }
  </style>
</head>
<body>
  <main class="card">
    <h1>South Mountain Owner Support</h1>
    <p class="subtitle">Save our contact numbers directly to your phone.</p>

    <a class="button" href="SouthMountainOwnerSupportContacts.vcf" download>Download Contacts</a>

    <div class="instructions">
      <p><strong>iPhone:</strong> After downloading, open the file and choose to add the contacts.</p>
      <p><strong>Android:</strong> After downloading, open the file and import the contacts.</p>
    </div>

    <p class="fallback">If the button does not work, <a href="SouthMountainOwnerSupportContacts.vcf" download>tap here instead</a>.</p>
  </main>
</body>
</html>
