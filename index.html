<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>South Mountain Owner Support Contacts</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f5f5f5;
      color: #222;
    }
    .card {
      background: white;
      max-width: 440px;
      width: calc(100% - 32px);
      padding: 32px 24px;
      border-radius: 18px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.12);
      text-align: center;
    }
    h1 {
      margin: 0 0 12px;
      font-size: 28px;
      line-height: 1.2;
    }
    p {
      font-size: 16px;
      line-height: 1.45;
      margin: 12px 0;
    }
    .button {
      display: inline-block;
      margin: 22px 0 12px;
      padding: 16px 24px;
      background: #222;
      color: #fff;
      text-decoration: none;
      border-radius: 10px;
      font-size: 18px;
      font-weight: bold;
    }
    .small {
      font-size: 13px;
      color: #555;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>South Mountain Owner Support</h1>
    <p>Save our important contact numbers directly to your phone.</p>
    <a class="button" href="SouthMountainOwnerSupport.vcf" download>Download Contacts</a>
    <p class="small">After downloading, open the contact file and choose “Import” or “Add Contact.”</p>
  </main>
</body>
</html>
