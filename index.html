<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>South Mountain Owner Support</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f5f5f5;
      color: #1f2937;
    }
    .card {
      background: white;
      max-width: 430px;
      width: calc(100% - 32px);
      padding: 34px 26px;
      border-radius: 18px;
      box-shadow: 0 12px 35px rgba(0,0,0,0.15);
      text-align: center;
    }
    h1 {
      margin: 0 0 18px;
      font-size: 32px;
      line-height: 1.15;
      font-weight: 800;
    }
    p {
      font-size: 20px;
      line-height: 1.35;
      margin: 16px 0;
    }
    .button {
      display: block;
      margin: 26px 0 26px;
      padding: 18px 22px;
      background: #111827;
      color: #fff;
      text-decoration: none;
      border-radius: 14px;
      font-size: 22px;
      font-weight: 800;
    }
    .instructions {
      text-align: left;
      font-size: 18px;
      line-height: 1.45;
    }
    .instructions strong {
      font-weight: 800;
    }
    .fallback {
      color: #555;
      font-size: 16px;
    }
    .fallback a {
      color: #333;
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>South Mountain Owner Support</h1>
    <p>Save our contact numbers directly to your phone.</p>
    <a class="button" href="SouthMountainOwnerSupport.vcf">Download Contacts</a>

    <div class="instructions">
      <p><strong>iPhone:</strong> After downloading, open the file and choose to add the contacts.</p>
      <p><strong>Android:</strong> After downloading, open the file and import the contacts.</p>
    </div>

    <p class="fallback">If the button does not work, <a href="SouthMountainOwnerSupport.vcf">tap here instead</a>.</p>
  </main>
</body>
</html>
